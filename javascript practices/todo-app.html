<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* THEME VARS */
body.light {
  --bg: #f0f4ff;
  --bg2: radial-gradient(circle at 15% 50%, #e0e8ff, transparent 50%),
         radial-gradient(circle at 85% 30%, #fce4f3, transparent 50%);
  --card: #ffffff;
  --card2: #f7f8ff;
  --border: #dde2f5;
  --border2: #c4ccee;
  --text: #1a1d2e;
  --text2: #4a4f6e;
  --text3: #9098be;
  --accent: #7c3aed;
  --accent-light: #f3efff;
  --accent-shadow: #5b21b6;
  --green: #10b981;
  --green-light: #eafaf4;
  --pink: #f43f8e;
  --strike: #c4ccee;
}

body.dark {
  --bg: #0f1117;
  --bg2: radial-gradient(circle at 15% 50%, #1a1f35, transparent 50%),
         radial-gradient(circle at 85% 30%, #1f1225, transparent 50%);
  --card: #1c1f2e;
  --card2: #242838;
  --border: #2e3350;
  --border2: #3d4260;
  --text: #e8ecff;
  --text2: #8890b8;
  --text3: #4a5080;
  --accent: #a78bfa;
  --accent-light: #1e1a30;
  --accent-shadow: #7c3aed;
  --green: #34d399;
  --green-light: #0d2620;
  --pink: #f472b6;
  --strike: #3d4260;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  background-image: var(--bg2);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 48px 16px 80px;
  transition: background 0.3s;
}

.app { width: 100%; max-width: 500px; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

h1 {
  font-size: 32px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -1px;
}

h1 span { color: var(--accent); }

.theme-btn {
  width: 42px; height: 42px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, transform 0.1s;
  box-shadow: 0 2px 0 var(--border);
}

.theme-btn:hover { border-color: var(--accent); transform: rotate(20deg); }

/* INPUT CARD */
.input-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 3px 0 var(--border);
  display: flex;
  gap: 10px;
}

.input-card input {
  flex: 1;
  background: var(--card2);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input-card input::placeholder { color: var(--text3); font-weight: 600; }
.input-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

.add-btn {
  padding: 10px 18px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--accent-shadow);
  transition: transform 0.1s, box-shadow 0.1s;
  white-space: nowrap;
}

.add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--accent-shadow); }
.add-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--accent-shadow); }

/* FILTERS */
.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

.filter-btn {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--card);
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 800;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

/* TODO LIST */
.todo-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}

.todo-item {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 0 var(--border);
  transition: opacity 0.2s, border-color 0.2s;
  animation: slideIn 0.2s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.todo-item.done { opacity: 0.6; border-color: var(--green); }

.check-wrap {
  width: 22px; height: 22px;
  border-radius: 7px;
  border: 2px solid var(--border2);
  background: var(--card2);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  color: transparent;
  transition: all 0.15s;
}

.todo-item.done .check-wrap {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green);
}

.todo-text {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  transition: color 0.2s;
}

.todo-item.done .todo-text {
  text-decoration: line-through;
  text-decoration-color: var(--strike);
  color: var(--text3);
}

.del-btn {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: none;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.del-btn:hover { border-color: var(--pink); color: var(--pink); background: #fff0f7; }

/* STATS */
.stats {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 0 var(--border);
  margin-bottom: 14px;
}

.stat { text-align: center; }
.stat-num { font-size: 22px; font-weight: 900; color: var(--accent); }
.stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }

.clear-done {
  background: none;
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 800;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}

.clear-done:hover { border-color: var(--pink); color: var(--pink); }

/* EMPTY */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 13px;
  font-weight: 700;
}

.empty .icon { font-size: 36px; margin-bottom: 8px; }

/* STATE INSPECTOR */
.inspector {
  background: #0f1117;
  border-radius: 14px;
  padding: 16px;
  border: 2px solid #2e3350;
}

.inspector-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #4a5080;
  margin-bottom: 10px;
}

.inspector pre {
  font-family: monospace;
  font-size: 12px;
  color: #a78bfa;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-all;
}

.inspector pre .key   { color: #7c85c9; }
.inspector pre .str   { color: #34d399; }
.inspector pre .bool  { color: #f97316; }
.inspector pre .num   { color: #f472b6; }
</style>
</head>
<body class="light">
<div class="app">

  <div class="header">
    <h1>my <span>todos</span></h1>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>

  <div class="input-card">
    <input type="text" id="todo-input" placeholder="Add a new todo..." maxlength="80"
      onkeydown="if(event.key==='Enter') addTodoFromInput()" />
    <button class="add-btn" onclick="addTodoFromInput()">+ Add</button>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-f="all"       onclick="setFilter('all')">All</button>
    <button class="filter-btn"        data-f="active"    onclick="setFilter('active')">Active</button>
    <button class="filter-btn"        data-f="completed" onclick="setFilter('completed')">Completed</button>
  </div>

  <div class="todo-list" id="todo-list"></div>

  <div class="stats" id="stats"></div>

  <div class="inspector">
    <div class="inspector-title">localStorage — state snapshot</div>
    <pre id="inspector"></pre>
  </div>

</div>

<script>
// ── EXACT PATTERN FROM THE EXERCISE ──────────────────────────────────

const state = {
  todos:  [],
  filter: "all",
  theme:  "light"
};

function setState(updates) {
  Object.assign(state, updates);
  saveState();
  render();
}

function setFilter(filter) {
  setState({ filter });
}

function addTodo(text) {
  setState({
    todos: [...state.todos, { id: Date.now(), text, completed: false }]
  });
}

function toggleTodo(id) {
  setState({
    todos: state.todos.map(todo =>
      todo.id === id ? { ...todo, completed: !todo.completed } : todo
    )
  });
}

function deleteTodo(id) {
  setState({ todos: state.todos.filter(t => t.id !== id) });
}

function clearCompleted() {
  setState({ todos: state.todos.filter(t => !t.completed) });
}

function toggleTheme() {
  setState({ theme: state.theme === "light" ? "dark" : "light" });
}

function saveState() {
  localStorage.setItem("appState", JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem("appState");
  if (saved) {
    Object.assign(state, JSON.parse(saved));
  }
}

// ── RENDER ────────────────────────────────────────────────────────────

function render() {
  // theme
  document.body.className = state.theme;
  document.querySelector('.theme-btn').textContent = state.theme === "light" ? "🌙" : "☀️";

  // filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.f === state.filter);
  });

  // filtered todos
  const visible = state.todos.filter(t => {
    if (state.filter === "active")    return !t.completed;
    if (state.filter === "completed") return  t.completed;
    return true;
  });

  const list = document.getElementById('todo-list');

  if (visible.length === 0) {
    const msgs = { all: "No todos yet — add one above!", active: "Nothing left to do 🎉", completed: "No completed todos yet." };
    list.innerHTML = `<div class="empty"><div class="icon">✦</div>${msgs[state.filter]}</div>`;
  } else {
    list.innerHTML = visible.map(t => `
      <div class="todo-item ${t.completed ? 'done' : ''}">
        <div class="check-wrap" onclick="toggleTodo(${t.id})">✓</div>
        <span class="todo-text">${escHtml(t.text)}</span>
        <button class="del-btn" onclick="deleteTodo(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // stats
  const total     = state.todos.length;
  const completed = state.todos.filter(t => t.completed).length;
  const active    = total - completed;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--pink)">${active}</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${completed}</div><div class="stat-label">Done</div></div>
    <button class="clear-done" onclick="clearCompleted()">Clear done</button>
  `;

  // inspector — pretty-print state
  const json = JSON.stringify(state, null, 2);
  document.getElementById('inspector').innerHTML = json
    .replace(/("[\w]+")(: )/g, '<span class="key">$1</span>$2')
    .replace(/: (".*?")/g, ': <span class="str">$1</span>')
    .replace(/: (true|false)/g, ': <span class="bool">$1</span>')
    .replace(/: (\d+)/g, ': <span class="num">$1</span>');
}

function addTodoFromInput() {
  const input = document.getElementById('todo-input');
  const text  = input.value.trim();
  if (!text) return;
  addTodo(text);
  input.value = '';
  input.focus();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── BOOT ──────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
